<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Match 3 Pills</title>
  <style>
    :root{
      --bg0:#090c12;
      --bg1:#101827;
      --bg2:#162235;
      --panel:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.09);
      --text:#f5f8ff;
      --muted:#adb8cf;
      --shadow:0 18px 48px rgba(0,0,0,.34);
    }

    html,body{
      margin:0;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(60, 95, 150, .22), transparent 34%),
        radial-gradient(circle at bottom, rgba(120, 70, 170, .18), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg0) 78%);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      touch-action:none;
    }

    *{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}

    #cookieNotice{
      position:fixed;
      left:12px;
      right:12px;
      top:12px;
      z-index:50;
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:16px;
      background:rgba(12,16,24,.96);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 30px rgba(0,0,0,.32);
      color:#f5f8ff;
      font-weight:800;
    }
    #cookieNotice .msg{display:flex;align-items:center;gap:8px;min-width:0}
    #cookieNotice .msg span{opacity:.95}
    #cookieNotice button{
      border:none;
      background:rgba(255,255,255,.08);
      color:#fff;
      width:38px;
      height:38px;
      border-radius:12px;
      font-size:18px;
      font-weight:900;
    }

    #app{
      height:100%;
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      gap:12px;
      padding:12px;
    }

    .topbar,.bottombar{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      padding:10px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.035));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .topbar{justify-content:flex-start}
    .bottombar{justify-content:center}

    .icon-btn,.mode-btn,.bonus-btn,.pause-btn{
      border:none;
      border-radius:18px;
      min-width:46px;
      min-height:46px;
      padding:10px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
      color:var(--text);
      box-shadow:0 8px 18px rgba(0,0,0,.22);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:900;
      font-size:15px;
      white-space:nowrap;
    }

    .mode-btn.active{
      background:linear-gradient(180deg, rgba(25, 125, 165, .82), rgba(14, 58, 82, .94));
      box-shadow:0 0 0 1px rgba(130, 230, 255, .16), 0 12px 28px rgba(0,0,0,.28);
    }

    .pause-btn.active{
      background:linear-gradient(180deg, rgba(150, 120, 30, .78), rgba(82, 60, 8, .92));
    }

    .stat{
      min-width:88px;
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
    }

    .stat .ico{font-size:18px;width:20px;text-align:center}
    .stat .num{min-width:24px;text-align:left}

    #board-wrap{
      min-width:0;
      display:grid;
      place-items:center;
    }

    #board-shell{
      position:relative;
      width:min(92vw, 76vh);
      aspect-ratio:1;
      border-radius:28px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.06), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      padding:12px;
      overflow:hidden;
    }

    #board{
      position:relative;
      width:100%;
      height:100%;
      border-radius:20px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.06), transparent 34%),
        linear-gradient(180deg, #161c2a, #0f131c);
      overflow:hidden;
      touch-action:none;
    }

    .grid-lines{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.42;
      background-image:
        linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size:calc(100% / var(--cols)) calc(100% / var(--rows));
    }

    .cell{
      position:absolute;
      transform:translate(-50%,-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      will-change:transform,left,top,opacity;
    }

    .cell.fall-in{
      animation:fallIn .8s cubic-bezier(.2,.86,.18,1) both;
      animation-delay:var(--delay, 0ms);
    }

    .pill-svg{
      width:86%;
      height:64%;
      overflow:visible;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.28));
    }

    .pill-shape{
      stroke:rgba(255,255,255,.16);
      stroke-width:1.2;
      vector-effect:non-scaling-stroke;
    }

    .pill-normal{
      fill:url(#pillGrad);
    }

    .pill-rainbow{
      fill:url(#rainbowGrad);
      animation:rainbow-shift 1.05s linear infinite;
    }

    .pill-black{fill:url(#blackGrad)}
    .pill-fizz{fill:url(#fizzGrad)}

    .pill-highlight{
      opacity:.85;
      fill:url(#shineGrad);
    }

    .stripe{
      fill:rgba(255,255,255,.62);
      filter:drop-shadow(0 0 8px rgba(255,255,255,.22));
    }

    .selected .pill-svg{filter:drop-shadow(0 0 14px rgba(125,220,255,.78));}
    .target .pill-svg{
      filter:drop-shadow(0 0 10px rgba(255,255,255,.55));
    }
    .source .pill-svg{filter:drop-shadow(0 0 12px rgba(255,255,255,.62));}

    canvas#fx{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .bonus-btn{
      flex:1 1 110px;
      min-width:110px;
      flex-direction:column;
      gap:4px;
      padding:10px 8px;
    }

    .bonus-btn .ico{font-size:23px;line-height:1}
    .bonus-btn .price{font-size:13px;opacity:.94}

    .bonus-btn.active-tool{
      box-shadow:0 0 0 1px rgba(130,230,255,.22), 0 0 18px rgba(120,220,255,.18), 0 8px 18px rgba(0,0,0,.22) !important;
    }

    .bonus-btn:disabled{
      opacity:.42;
      filter:saturate(.6);
    }

    #toast{
      position:fixed;
      left:50%;
      bottom:16px;
      transform:translateX(-50%) translateY(8px);
      padding:10px 14px;
      border-radius:14px;
      background:rgba(12,16,24,.92);
      border:1px solid rgba(255,255,255,.09);
      box-shadow:0 14px 30px rgba(0,0,0,.28);
      opacity:0;
      transition:opacity .2s, transform .2s;
      pointer-events:none;
      font-weight:800;
      max-width:min(92vw, 520px);
      text-align:center;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @keyframes rainbow-shift{from{background-position:0% 50%}to{background-position:100% 50%}}
    @keyframes fallIn{
      from{transform:translate(-50%,-50%) translateY(-120px);opacity:0.06}
      60%{opacity:1}
      to{transform:translate(-50%,-50%) translateY(0);opacity:1}
    }

    @media (max-width: 920px){
      #board-shell{width:min(96vw, 82vh)}
      .stat{min-width:unset;padding:8px 10px}
      .bonus-btn{flex-basis:calc(50% - 10px);min-width:calc(50% - 10px)}
    }

    @media (max-width: 520px){
      #app{gap:10px;padding:10px}
      .topbar,.bottombar{gap:8px;padding:8px;border-radius:20px}
      .icon-btn,.mode-btn,.pause-btn,.bonus-btn{border-radius:16px}
      #board-shell{width:min(96vw, 80vh);padding:10px;border-radius:24px}
      .bonus-btn{flex-basis:calc(50% - 8px);min-width:calc(50% - 8px);padding:9px 6px}
    }
  </style>
</head>
<body>
<div id="cookieNotice">
  <div class="msg"><span>🍪</span><span>This game uses cookies to save progress.</span></div>
  <button id="cookieClose" aria-label="Close">✕</button>
</div>

<div id="app">
  <div class="topbar">
    <button id="modeBtn" class="mode-btn" aria-label="Mode">⏱</button>
    <button id="pauseBtn" class="pause-btn" aria-label="Pause">⏸</button>
    <button id="shuffleBtn" class="icon-btn" aria-label="Shuffle">🔀</button>
    <div class="stat" aria-label="Score"><span class="ico">⭐</span><span class="num" id="score">0</span></div>
    <div class="stat" aria-label="Coins"><span class="ico">🪙</span><span class="num" id="coins">0</span></div>
    <div class="stat" aria-label="Moves"><span class="ico">👣</span><span class="num" id="moves">0</span></div>
    <div class="stat" aria-label="Shuffles"><span class="ico">🔁</span><span class="num" id="shuffles">0</span></div>
    <div class="stat" id="timeBox" aria-label="Time"><span class="ico">⏳</span><span class="num" id="timeLeft">180</span></div>
  </div>

  <div id="board-wrap">
    <div id="board-shell">
      <div id="board">
        <svg width="0" height="0" style="position:absolute">
          <defs>
            <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity=".42"/>
              <stop offset="18%" stop-color="var(--pill-top, #ff5f60)"/>
              <stop offset="100%" stop-color="var(--pill-bottom, #cc4550)"/>
            </linearGradient>
            <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff4d4d"/>
              <stop offset="16%" stop-color="#ffb347"/>
              <stop offset="33%" stop-color="#fff16a"/>
              <stop offset="50%" stop-color="#57ff74"/>
              <stop offset="66%" stop-color="#4fd8ff"/>
              <stop offset="83%" stop-color="#8b62ff"/>
              <stop offset="100%" stop-color="#ff68da"/>
            </linearGradient>
            <linearGradient id="blackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#3a3a3a"/>
              <stop offset="100%" stop-color="#040404"/>
            </linearGradient>
            <linearGradient id="fizzGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#77f8ff"/>
            </linearGradient>
            <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="rgba(255,255,255,.8)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <canvas id="fx"></canvas>
    </div>
  </div>

  <div class="bottombar" id="bonusBar">
    <button id="gloveBtn" class="bonus-btn" aria-label="Glove">
      <div class="ico">🧤</div>
      <div class="price">15</div>
    </button>
    <button id="bombBtn" class="bonus-btn" aria-label="Bomb">
      <div class="ico">💣</div>
      <div class="price">35</div>
    </button>
    <button id="timeBtn" class="bonus-btn" aria-label="Plus time">
      <div class="ico">⏱➕</div>
      <div class="price">45</div>
    </button>
    <button id="syringeBtn" class="bonus-btn" aria-label="Syringe">
      <div class="ico">💉</div>
      <div class="price">40</div>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
(() => {
  const ROWS = 8;
  const COLS = 8;
  const COLORS = ['#ff5f60', '#4eb8ff', '#6ef06f', '#ffc94a', '#b564ff', '#ff72dd'];
  const RAINBOW = 'rainbow';
  const BLACK = 'black';
  const FIZZ = 'fizz';
  const MODES = ['time', 'moves', 'endless'];

  const COOKIE_KEY = 'match3_pills_progress_v3';
  const COOKIE_NOTICE_KEY = 'match3_pills_cookie_notice_v1';

  const board = document.getElementById('board');
  const shell = document.getElementById('board-shell');
  const fx = document.getElementById('fx');
  const ctx = fx.getContext('2d');

  const scoreEl = document.getElementById('score');
  const coinsEl = document.getElementById('coins');
  const movesEl = document.getElementById('moves');
  const shufflesEl = document.getElementById('shuffles');
  const timeLeftEl = document.getElementById('timeLeft');
  const timeBox = document.getElementById('timeBox');

  const modeBtn = document.getElementById('modeBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const gloveBtn = document.getElementById('gloveBtn');
  const bombBtn = document.getElementById('bombBtn');
  const timeBtn = document.getElementById('timeBtn');
  const syringeBtn = document.getElementById('syringeBtn');
  const toast = document.getElementById('toast');
  const bonusBar = document.getElementById('bonusBar');
  const cookieNotice = document.getElementById('cookieNotice');
  const cookieClose = document.getElementById('cookieClose');

  let grid = [];
  let score = 0;
  let coins = 0;
  let moves = 80;
  let shuffles = 0;
  let mode = 'time';
  let paused = false;
  let timeLeft = 180;
  let timer = null;
  let activeTool = null;
  let syringeSourceColor = null;
  let syringeSourcePos = null;
  let selected = null;
  let dragStart = null;
  let pointerDown = false;
  let boardLocked = false;
  let cellSize = 0;
  let boardW = 0;
  let boardH = 0;
  let particles = [];
  let scoreMilestone = 0;
  let fallMap = new Map();
  let hoverTarget = null;
  let saveTimer = null;
  let showCookieBanner = getCookie(COOKIE_NOTICE_KEY) !== '1';
  let storedEndlessGrid = null;
  let suppressSave = false;

  function rand(arr){ return arr[(Math.random() * arr.length) | 0]; }
  function toastMsg(text){
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1100);
  }

  function setCookie(name, value, days = 365){
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
  }

  function getCookie(name){
    const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : '';
  }

  function cloneGrid(source){
    return source.map(row => row.map(cell => cell ? ({ ...cell }) : null));
  }

  function serializeGrid(source){
    return source.map(row => row.map(cell => cell ? { type: cell.type, color: cell.color, active: !!cell.active } : null));
  }

  function deserializeGrid(data){
    return data.map(row => row.map(cell => cell ? ({ type: cell.type, color: cell.color, active: !!cell.active }) : null));
  }

  function scheduleSave(){
    if (suppressSave) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveGame, 120);
  }

  function saveGame(){
    if (suppressSave) return;
    const payload = {
      grid: serializeGrid(grid),
      score,
      coins,
      moves,
      shuffles,
      mode,
      paused,
      timeLeft,
      scoreMilestone,
      storedEndlessGrid: storedEndlessGrid ? serializeGrid(storedEndlessGrid) : null
    };
    try{
      setCookie(COOKIE_KEY, btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
    }catch(_e){}
  }

  function loadGame(){
    const raw = getCookie(COOKIE_KEY);
    if (!raw) return false;
    try{
      const json = decodeURIComponent(escape(atob(raw)));
      const data = JSON.parse(json);
      if (Array.isArray(data.grid)) grid = deserializeGrid(data.grid);
      score = Number(data.score || 0);
      coins = Number(data.coins || 0);
      moves = Number(data.moves || 80);
      shuffles = Number(data.shuffles || 0);
      mode = MODES.includes(data.mode) ? data.mode : 'time';
      paused = !!data.paused;
      timeLeft = Number(data.timeLeft || 180);
      scoreMilestone = Number(data.scoreMilestone || 0);
      storedEndlessGrid = Array.isArray(data.storedEndlessGrid) ? deserializeGrid(data.storedEndlessGrid) : null;
      return true;
    }catch(_e){
      return false;
    }
  }

  function resize(){
    const rect = shell.getBoundingClientRect();
    boardW = rect.width - 24;
    boardH = rect.height - 24;
    fx.width = Math.floor(boardW * devicePixelRatio);
    fx.height = Math.floor(boardH * devicePixelRatio);
    fx.style.width = boardW + 'px';
    fx.style.height = boardH + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    cellSize = Math.min(boardW / COLS, boardH / ROWS);
    board.style.setProperty('--cols', COLS);
    board.style.setProperty('--rows', ROWS);
    render();
  }
  window.addEventListener('resize', resize);

  function makeItem(forceType = null){
    if (forceType === RAINBOW) return { type: RAINBOW, color: null, active: true };
    if (forceType === BLACK) return { type: BLACK, color: null, active: false };
    if (forceType === FIZZ) return { type: FIZZ, color: null, active: true };
    const p = Math.random();
    if (p < 0.0009) return { type: FIZZ, color: null, active: true };
    if (p < 0.016) return { type: BLACK, color: null, active: false };
    if (p < 0.032) return { type: RAINBOW, color: null, active: true };
    return { type: 'color', color: rand(COLORS), active: true };
  }

  function matchesColor(item, color){
    if (!item) return false;
    if (item.type === RAINBOW) return true;
    if (item.type === 'color') return item.color === color;
    return false;
  }

  function immediateMatchAt(r, c){
    const item = grid[r][c];
    if (!item || item.type !== 'color') return false;
    const color = item.color;
    let count = 1;
    for (let dc = 1; c - dc >= 0 && grid[r][c - dc] && matchesColor(grid[r][c - dc], color); dc++) count++;
    for (let dc = 1; c + dc < COLS && grid[r][c + dc] && matchesColor(grid[r][c + dc], color); dc++) count++;
    if (count >= 3) return true;
    count = 1;
    for (let dr = 1; r - dr >= 0 && grid[r - dr][c] && matchesColor(grid[r - dr][c], color); dr++) count++;
    for (let dr = 1; r + dr < ROWS && grid[r + dr][c] && matchesColor(grid[r + dr][c], color); dr++) count++;
    return count >= 3;
  }

  function buildGrid(){
    grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => null));
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        let item;
        do {
          item = makeItem();
          grid[r][c] = item;
        } while (immediateMatchAt(r, c));
      }
    }
  }

  function randomizeBoardPreserveState(){
    const items = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) items.push(grid[r][c]);
    for (let i = items.length - 1; i > 0; i--){
      const j = (Math.random() * (i + 1)) | 0;
      [items[i], items[j]] = [items[j], items[i]];
    }
    let k = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = items[k++];
    let guard = 0;
    while (collectMatches().length && guard++ < 6){
      for (let i = items.length - 1; i > 0; i--){
        const j = (Math.random() * (i + 1)) | 0;
        [items[i], items[j]] = [items[j], items[i]];
      }
      k = 0;
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = items[k++];
    }
    markAllAsFalling();
    render();
  }

  function markAllAsFalling(){
    fallMap.clear();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) fallMap.set(`${r},${c}`, r);
    setTimeout(() => fallMap.clear(), 900);
  }

  function getItem(r, c){ return grid[r]?.[c] ?? null; }
  function swap(a, b){ const t = grid[a.r][a.c]; grid[a.r][a.c] = grid[b.r][b.c]; grid[b.r][b.c] = t; }
  function adjacent(a, b){ return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1; }
  function cellCenter(r, c){ return { x: c * cellSize + cellSize / 2, y: r * cellSize + cellSize / 2 }; }
  function cellFromPoint(x, y){
    const c = Math.floor(x / cellSize);
    const r = Math.floor(y / cellSize);
    if (r < 0 || c < 0 || r >= ROWS || c >= COLS) return null;
    return { r, c };
  }

  function pillSvgMarkup(item, key){
    const w = 100;
    const h = 72;
    const rx = 36;
    const x = 8;
    const y = 8;
    const fillClass = item.type === 'color' ? 'pill-normal' : item.type === RAINBOW ? 'pill-rainbow' : item.type === BLACK ? 'pill-black' : 'pill-fizz';
    const highlight = item.type === BLACK ? '' : '<ellipse class="pill-highlight" cx="28" cy="20" rx="18" ry="10" />';
    const stripeColor = item.type === BLACK ? 'rgba(255,255,255,.28)' : 'rgba(255,255,255,.68)';
    return `
      <svg class="pill-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="g-${key}" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="${item.type === 'color' ? item.color : '#ffffff'}" stop-opacity=".48" />
            <stop offset="100%" stop-color="${item.type === 'color' ? shadeColor(item.color, -22) : '#000000'}" stop-opacity="1" />
          </linearGradient>
        </defs>
        <rect x="${x}" y="${y}" width="${w - 16}" height="${h - 16}" rx="${rx}" class="pill-shape ${fillClass}" fill="url(#g-${key})" />
        ${highlight}
        <rect x="47" y="14" width="6" height="44" rx="3" class="stripe" fill="${stripeColor}" />
      </svg>
    `;
  }

  function render(){
    board.innerHTML = '';
    const gridLines = document.createElement('div');
    gridLines.className = 'grid-lines';
    board.appendChild(gridLines);

    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const item = grid[r][c];
        if (!item) continue;
        const cell = document.createElement('div');
        cell.className = 'cell';
        const key = `${r}-${c}-${Math.random().toString(36).slice(2,7)}`;
        if (fallMap.has(`${r},${c}`)){
          cell.classList.add('fall-in');
          cell.style.setProperty('--delay', `${Math.min(fallMap.get(`${r},${c}`) * 80, 560)}ms`);
        }
        if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
        if (syringeSourcePos && syringeSourcePos.r === r && syringeSourcePos.c === c) cell.classList.add('source');
        if (hoverTarget && hoverTarget.r === r && hoverTarget.c === c) cell.classList.add('target');
        cell.style.left = (c * cellSize + cellSize / 2) + 'px';
        cell.style.top = (r * cellSize + cellSize / 2) + 'px';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.innerHTML = pillSvgMarkup(item, key);
        board.appendChild(cell);
      }
    }
    updateCookieBanner();
  }

  function shadeColor(hex, amount){
    if (!hex || typeof hex !== 'string' || !hex.startsWith('#')) return '#000000';
    const raw = hex.replace('#', '');
    const num = parseInt(raw, 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + amount));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amount));
    const b = Math.max(0, Math.min(255, (num & 0xff) + amount));
    return `rgb(${r}, ${g}, ${b})`;
  }

  function burst(x, y, kind = 'normal', count = 16){
    const palette = kind === 'fizz' ? ['#ffffff', '#dbffff', '#a8f7ff'] : ['#ffffff', '#eff4ff', '#a8c5ff'];
    for (let i = 0; i < count; i++){
      particles.push({
        x,
        y,
        vx: (Math.random() * 2 - 1) * (kind === 'fizz' ? 4.2 : 3.0),
        vy: (Math.random() * 2 - 1) * (kind === 'fizz' ? 4.2 : 3.0),
        life: 34 + Math.random() * 14,
        r: 1.5 + Math.random() * 2.4,
        col: rand(palette)
      });
    }
  }

  function fxLoop(){
    ctx.clearRect(0, 0, boardW, boardH);
    particles = particles.filter(p => p.life > 0);
    for (const p of particles){
      p.life -= 1;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 38));
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(fxLoop);
  }

  function scoreFactor(){
    if (mode === 'moves') return 0.4;
    return 1;
  }

  function addScore(points){
    const gained = Math.max(1, Math.round(points * scoreFactor()));
    score += gained;
    scoreEl.textContent = score;

    if (mode === 'time'){
      const milestone = Math.floor(score / 1500);
      while (milestone > scoreMilestone){
        scoreMilestone += 1;
        shuffles += 1;
        coins += 10;
        shufflesEl.textContent = shuffles;
        coinsEl.textContent = coins;
        toastMsg('➕🔀➕🪙');
      }
    }
    scheduleSave();
  }

  function refill(){
    fallMap.clear();
    for (let c = 0; c < COLS; c++){
      let empty = 0;
      for (let r = ROWS - 1; r >= 0; r--){
        if (!grid[r][c]){
          empty++;
        } else if (empty > 0){
          grid[r + empty][c] = grid[r][c];
          grid[r][c] = null;
          fallMap.set(`${r + empty},${c}`, r + empty);
        }
      }
      for (let r = 0; r < ROWS; r++){
        if (!grid[r][c]){
          grid[r][c] = makeItem();
          fallMap.set(`${r},${c}`, r);
        }
      }
    }
    setTimeout(() => fallMap.clear(), 900);
  }

  function collectMatches(){
    const groups = [];
    for (let r = 0; r < ROWS; r++){
      let c = 0;
      while (c < COLS){
        const start = c;
        const base = grid[r][c];
        if (!base){ c++; continue; }
        if (base.type === BLACK){ c++; continue; }
        const color = base.type === 'color' ? base.color : null;
        c++;
        while (c < COLS && grid[r][c] && (matchesColor(grid[r][c], color) || grid[r][c].type === BLACK)) c++;
        if (c - start >= 3) groups.push({ items: Array.from({ length: c - start }, (_, i) => ({ r, c: start + i, item: grid[r][start + i] })) });
      }
    }
    for (let c = 0; c < COLS; c++){
      let r = 0;
      while (r < ROWS){
        const start = r;
        const base = grid[r][c];
        if (!base){ r++; continue; }
        if (base.type === BLACK){ r++; continue; }
        const color = base.type === 'color' ? base.color : null;
        r++;
        while (r < ROWS && grid[r][c] && (matchesColor(grid[r][c], color) || grid[r][c].type === BLACK)) r++;
        if (r - start >= 3) groups.push({ items: Array.from({ length: r - start }, (_, i) => ({ r: start + i, c, item: grid[start + i][c] })) });
      }
    }
    return groups;
  }

  function resolveBoard(){
    if (boardLocked) return;
    boardLocked = true;
    let didSomething = false;
    while (true){
      const groups = collectMatches();
      if (!groups.length) break;
      didSomething = true;
      const keep = new Set();
      for (const group of groups){
        const hasBlack = group.items.some(x => x.item && x.item.type === BLACK);
        if (hasBlack){
          for (const x of group.items){
            if (x.item && x.item.type === BLACK){
              x.item.type = 'color';
              x.item.color = rand(COLORS);
              x.item.active = true;
              keep.add(`${x.r},${x.c}`);
              const p = cellCenter(x.r, x.c);
              burst(p.x, p.y, 'normal', 10);
            }
          }
        }
      }
      let cleared = 0;
      for (const group of groups){
        for (const x of group.items){
          const key = `${x.r},${x.c}`;
          if (keep.has(key)) continue;
          const item = grid[x.r][x.c];
          if (!item) continue;
          const p = cellCenter(x.r, x.c);
          burst(p.x, p.y, item.type === FIZZ ? 'fizz' : 'normal', item.type === FIZZ ? 18 : 12);
          grid[x.r][x.c] = null;
          cleared += 1;
        }
      }
      refill();
      addScore(100 * cleared);
    }
    if (didSomething){
      render();
      ensurePlayable();
    }
    boardLocked = false;
    scheduleSave();
  }

  function hasMoves(){
    for (let r = 0; r < ROWS; r++){
      for (let c = 0; c < COLS; c++){
        const a = { r, c };
        for (const d of [{ r: 1, c: 0 }, { r: 0, c: 1 }]){
          const b = { r: r + d.r, c: c + d.c };
          if (b.r >= ROWS || b.c >= COLS) continue;
          swap(a, b);
          const ok = collectMatches().length > 0;
          swap(a, b);
          if (ok) return true;
        }
      }
    }
    return false;
  }

  function shuffleBoard(){
    if (mode === 'endless') return toastMsg('⛔');
    if (shuffles <= 0 || boardLocked) return toastMsg('⛔');
    shuffles -= 1;
    shufflesEl.textContent = shuffles;
    const items = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) items.push(grid[r][c]);
    for (let i = items.length - 1; i > 0; i--){
      const j = (Math.random() * (i + 1)) | 0;
      [items[i], items[j]] = [items[j], items[i]];
    }
    let k = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = items[k++];
    resolveBoard();
    if (!hasMoves()) shuffleBoard();
    render();
    scheduleSave();
  }

  function spendMove(){
    if (mode === 'moves'){
      moves -= 1;
      if (moves < 0) moves = 0;
      movesEl.textContent = moves;
      if (moves === 0){
        toastMsg('⛔');
      }
    }
    scheduleSave();
  }

  function activateFizzAt(r, c){
    const item = getItem(r, c);
    if (!item || item.type !== FIZZ) return false;
    const horizontal = Math.random() < 0.5;
    const list = [];
    if (horizontal){ for (let x = 0; x < COLS; x++) list.push({ r, c: x }); }
    else { for (let y = 0; y < ROWS; y++) list.push({ r: y, c }); }
    for (const p of list){
      if (grid[p.r][p.c]){
        const center = cellCenter(p.r, p.c);
        burst(center.x, center.y, 'fizz', 10);
        grid[p.r][p.c] = null;
      }
    }
    refill();
    addScore(300);
    render();
    resolveBoard();
    scheduleSave();
    return true;
  }

  function activateToolState(tool, payload = null){
    activeTool = tool;
    syringeSourceColor = payload?.color ?? null;
    syringeSourcePos = payload?.pos ?? null;
    gloveBtn.classList.toggle('active-tool', tool === 'glove');
    bombBtn.classList.toggle('active-tool', tool === 'bomb');
    syringeBtn.classList.toggle('active-tool', tool === 'syringe');
    document.body.style.cursor = tool ? 'crosshair' : 'default';
  }

  function clearToolState(){
    activeTool = null;
    syringeSourceColor = null;
    syringeSourcePos = null;
    hoverTarget = null;
    gloveBtn.classList.remove('active-tool');
    bombBtn.classList.remove('active-tool');
    syringeBtn.classList.remove('active-tool');
    document.body.style.cursor = 'default';
  }

  function buyTool(tool){
    if (mode === 'endless') return toastMsg('⛔');
    if (tool === 'time'){
      if (coins < 45) return toastMsg('⛔');
      coins -= 45;
      coinsEl.textContent = coins;
      timeLeft = Math.min(999, timeLeft + 50);
      timeLeftEl.textContent = timeLeft;
      toastMsg('⏳+50');
      scheduleSave();
      return;
    }
    const cost = tool === 'glove' ? 15 : tool === 'bomb' ? 35 : 40;
    if (coins < cost) return toastMsg('⛔');
    coins -= cost;
    coinsEl.textContent = coins;
    activateToolState(tool);
    toastMsg(tool === 'glove' ? '🧤' : tool === 'bomb' ? '💣' : '💉');
    scheduleSave();
  }

  function applyToolAt(r, c){
    if (!activeTool) return false;
    if (mode === 'endless') return false;
    const item = getItem(r, c);
    if (!item) return false;

    if (activeTool === 'glove'){
      const p = cellCenter(r, c);
      burst(p.x, p.y, 'normal', 16);
      grid[r][c] = null;
      refill();
      addScore(40);
      render();
      clearToolState();
      resolveBoard();
      return true;
    }

    if (activeTool === 'bomb'){
      hoverTarget = { r, c };
      render();
      const area = [
        { r, c },
        { r, c: c + 1 },
        { r: r + 1, c },
        { r: r + 1, c: c + 1 }
      ].filter(p => p.r < ROWS && p.c < COLS);
      for (const p of area){
        if (grid[p.r][p.c]){
          const center = cellCenter(p.r, p.c);
          burst(center.x, center.y, 'fizz', 12);
          grid[p.r][p.c] = null;
        }
      }
      refill();
      addScore(180);
      render();
      clearToolState();
      resolveBoard();
      return true;
    }

    if (activeTool === 'syringe'){
      if (!syringeSourceColor){
        if (item.type !== 'color') return false;
        syringeSourceColor = item.color;
        syringeSourcePos = { r, c };
        render();
        return true;
      }
      if (syringeSourcePos && syringeSourcePos.r === r && syringeSourcePos.c === c) return true;
      if (item.type === BLACK || item.type === FIZZ) return false;
      grid[r][c] = { type: 'color', color: syringeSourceColor, active: true };
      const p = cellCenter(r, c);
      burst(p.x, p.y, 'normal', 12);
      addScore(60);
      render();
      clearToolState();
      resolveBoard();
      return true;
    }
    return false;
  }

  function trySwap(a, b){
    if (!a || !b || !adjacent(a, b) || boardLocked || paused) return false;
    if (mode === 'moves' && moves <= 0) return false;
    swap(a, b);
    render();
    const found = collectMatches().length > 0;
    if (found){
      spendMove();
      resolveBoard();
      ensurePlayable();
      scheduleSave();
      return true;
    }
    swap(a, b);
    render();
    toastMsg('⟲');
    return false;
  }

  function ensurePlayable(){
    if (mode === 'endless') return;
    let guard = 0;
    while (!hasMoves() && guard++ < 8){
      if (shuffles > 0) shuffleBoard();
      else {
        if (mode === 'moves' && moves <= 0) break;
        if (moves <= 0) moves = mode === 'moves' ? 80 : 1;
        movesEl.textContent = moves;
        break;
      }
    }
  }

  function finishTimeMode(){
    mode = 'endless';
    paused = false;
    modeBtn.textContent = '♾';
    modeBtn.classList.remove('active');
    pauseBtn.textContent = '⏸';
    pauseBtn.classList.remove('active');
    timeBox.style.display = 'none';
    coins = coins;
    updateBonusAvailability();
    render();
    toastMsg('♾');
    scheduleSave();
  }

  function startTimer(){
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
      if (mode !== 'time' || paused) return;
      if (timeLeft > 0){
        timeLeft -= 1;
        timeLeftEl.textContent = timeLeft;
        scheduleSave();
      } else {
        finishTimeMode();
      }
    }, 1000);
  }

  function updateCookieBanner(){
    cookieNotice.style.display = showCookieBanner ? 'flex' : 'none';
  }

  function cycleMode(){
    const idx = MODES.indexOf(mode);
    const next = MODES[(idx + 1) % MODES.length];
    setMode(next);
  }

  function setMode(next){
    if (next === mode) return;

    if (mode === 'endless' && next === 'time'){
      storedEndlessGrid = cloneGrid(grid);
    }
    if (mode === 'time' && next === 'endless' && storedEndlessGrid){
      grid = cloneGrid(storedEndlessGrid);
    }

    mode = next;
    modeBtn.classList.toggle('active', mode === 'time');
    modeBtn.textContent = mode === 'time' ? '⏱' : mode === 'moves' ? '👣' : '♾';
    timeBox.style.display = mode === 'time' ? '' : 'none';

    if (mode === 'time'){
      timeLeft = 180;
      timeLeftEl.textContent = timeLeft;
      randomizeBoardPreserveState();
    } else if (mode === 'moves'){
      moves = 80;
      movesEl.textContent = moves;
      if (!grid.length) buildGrid();
      if (!hasAnyCells()) buildGrid();
    }

    paused = false;
    pauseBtn.textContent = '⏸';
    pauseBtn.classList.remove('active');
    updateBonusAvailability();
    if (mode === 'time' && !timer) startTimer();
    if (mode !== 'time') render();
    scheduleSave();
  }

  function hasAnyCells(){
    return grid.some(row => row.some(Boolean));
  }

  function togglePause(){
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
    pauseBtn.classList.toggle('active', paused);
    scheduleSave();
  }

  function updateBonusAvailability(){
    const enabled = mode !== 'endless' && !paused;
    gloveBtn.disabled = !enabled;
    bombBtn.disabled = !enabled;
    timeBtn.disabled = !enabled;
    syringeBtn.disabled = !enabled;
    shuffleBtn.disabled = !enabled || shuffles <= 0;
  }

  function init(){
    const loaded = loadGame();
    if (!loaded){
      buildGrid();
      score = 0;
      coins = 0;
      moves = 80;
      shuffles = 0;
      mode = 'time';
      paused = false;
      timeLeft = 180;
      scoreMilestone = 0;
      storedEndlessGrid = null;
    }

    scoreEl.textContent = score;
    coinsEl.textContent = coins;
    movesEl.textContent = moves;
    shufflesEl.textContent = shuffles;
    timeLeftEl.textContent = timeLeft;
    modeBtn.textContent = mode === 'time' ? '⏱' : mode === 'moves' ? '👣' : '♾';
    modeBtn.classList.toggle('active', mode === 'time');
    pauseBtn.textContent = paused ? '▶' : '⏸';
    pauseBtn.classList.toggle('active', paused);
    updateBonusAvailability();
    resize();

    if (!loaded) markAllAsFalling();
    render();
    if (mode === 'time') startTimer();
    requestAnimationFrame(fxLoop);
    setInterval(() => {
      updateBonusAvailability();
      if (mode === 'time' && !paused && !boardLocked && !hasMoves()){
        if (shuffles > 0) shuffleBoard();
        else if (moves <= 0) moves = 1;
      }
    }, 1100);
    scheduleSave();
  }

  board.addEventListener('pointerdown', (e) => {
    if (boardLocked || paused) return;
    const rect = board.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const cell = cellFromPoint(x, y);
    if (!cell) return;
    pointerDown = true;
    dragStart = cell;

    if (activeTool){
      applyToolAt(cell.r, cell.c);
      return;
    }

    const item = getItem(cell.r, cell.c);
    if (item && item.type === FIZZ){
      activateFizzAt(cell.r, cell.c);
      return;
    }

    selected = cell;
    render();
  });

  board.addEventListener('pointermove', (e) => {
    if (!pointerDown || !dragStart || activeTool || paused) return;
    const rect = board.getBoundingClientRect();
    const dx = e.clientX - rect.left - (dragStart.c * cellSize + cellSize / 2);
    const dy = e.clientY - rect.top - (dragStart.r * cellSize + cellSize / 2);
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < cellSize * 0.22) return;
    const dir = adx > ady ? { r: 0, c: dx > 0 ? 1 : -1 } : { r: dy > 0 ? 1 : -1, c: 0 };
    const target = { r: dragStart.r + dir.r, c: dragStart.c + dir.c };
    if (target.r < 0 || target.c < 0 || target.r >= ROWS || target.c >= COLS) return;
    pointerDown = false;
    selected = null;
    trySwap(dragStart, target);
  });

  board.addEventListener('pointerup', (e) => {
    const rect = board.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const cell = cellFromPoint(x, y);
    pointerDown = false;
    if (!cell){
      selected = null;
      render();
      return;
    }
    if (paused) return;
    if (activeTool){
      applyToolAt(cell.r, cell.c);
      return;
    }
    const item = getItem(cell.r, cell.c);
    if (item && item.type === FIZZ){
      activateFizzAt(cell.r, cell.c);
      return;
    }
    if (selected && selected.r === cell.r && selected.c === cell.c){
      render();
      return;
    }
    if (selected && adjacent(selected, cell)){
      trySwap(selected, cell);
      selected = null;
    } else {
      selected = cell;
    }
    render();
  });

  modeBtn.addEventListener('click', cycleMode);
  pauseBtn.addEventListener('click', togglePause);
  shuffleBtn.addEventListener('click', shuffleBoard);
  gloveBtn.addEventListener('click', () => buyTool('glove'));
  bombBtn.addEventListener('click', () => buyTool('bomb'));
  timeBtn.addEventListener('click', () => buyTool('time'));
  syringeBtn.addEventListener('click', () => buyTool('syringe'));
  cookieClose.addEventListener('click', () => {
    showCookieBanner = false;
    setCookie(COOKIE_NOTICE_KEY, '1');
    updateCookieBanner();
  });

  function activateFizzAt(r, c){
    const item = getItem(r, c);
    if (!item || item.type !== FIZZ) return false;
    const horizontal = Math.random() < 0.5;
    const list = [];
    if (horizontal){ for (let x = 0; x < COLS; x++) list.push({ r, c: x }); }
    else { for (let y = 0; y < ROWS; y++) list.push({ r: y, c }); }
    for (const p of list){
      if (grid[p.r][p.c]){
        const center = cellCenter(p.r, p.c);
        burst(center.x, center.y, 'fizz', 10);
        grid[p.r][p.c] = null;
      }
    }
    refill();
    addScore(300);
    render();
    resolveBoard();
    scheduleSave();
    return true;
  }

  function updateBonusBarLayout(){
    bonusBar.style.justifyContent = 'center';
  }

  window.addEventListener('beforeunload', saveGame);
  init();
  updateBonusBarLayout();
})();
</script>
